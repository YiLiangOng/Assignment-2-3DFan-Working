name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # Desktop (Linux/CMake build of the same GLFW+GLEW+GLM target used on
  # Windows -- proves Scene/ compiles cleanly with zero errors).
  # ---------------------------------------------------------------------
  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install X11/GL dev packages (needed to build GLFW)
        run: |
          sudo apt-get update
          sudo apt-get install -y xorg-dev libglu1-mesa-dev

      - name: Configure
        run: cmake -S . -B build_desktop -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build_desktop --config Debug --parallel

  # ---------------------------------------------------------------------
  # Android (Gradle + CMake/NDK build of the fan3d module).
  # ---------------------------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android NDK + CMake
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13

      - name: Assemble debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fan3d-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # ---------------------------------------------------------------------
  # WebGL (Emscripten build) -- deployed to GitHub Pages.
  # ---------------------------------------------------------------------
  build-web-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build web target
        run: |
          chmod +x build_web.sh
          ./build_web.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
